# GitHub Pages 部署流程 - 2026 精簡版
name: Deploy Static Content

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate New Index
        run: |
          python a999_自動生成index_html.py

      - name: Filter Deployment Content
        run: |
          echo "==== 開始清理忽略的子目錄 ===="
          # 根據 a999.py 的規範，移除不必要的資料夾
          # 只保留 docs 根目錄下的檔案與 assets 資料夾
          find docs -maxdepth 1 -type d ! -name 'docs' ! -name 'assets' -exec rm -rf {} +
          echo "==== 清理完畢，目前的 docs 目錄結構： ===="
          ls -F docs
          date

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Web Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
