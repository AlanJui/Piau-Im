<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta
      property="og:image"
      content="https://alanjui.github.io/Piau-Im/assets/picts/king_tian.png"
    />
    <title>河洛話讀古文</title>
    <link rel="stylesheet" href="./assets/styles/reset.css" />
    <link rel="stylesheet" href="./assets/styles/styles.css?v=9" />
  </head>

  <body>
    <!-- 頁首 -->
    <header id="header">
      <img
        src="./assets/picts/king_tian.png"
        width="300"
        height="200"
        alt="四晝五經"
      />
      <h1>河洛話讀古文</h1>
    </header>
    <!-- /#header -->

    <!-- 內容 -->
    <main id="main">
      <!-- 搜尋列 -->
      <div
        class="search-container"
        style="text-align: center; margin-bottom: 30px"
      >
        <input
          type="text"
          id="article-search"
          placeholder="欲搜尋之文件..."
          style="
            width: 100%;
            max-width: 600px;
            padding: 12px 20px;
            font-size: 20pt;
            border: 2px solid #ddd;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            outline: none;
            transition: border-color 0.3s;
          "
        />
      </div>
      <!-- 側邊選單 -->
      <div id="articles">{articles_placeholder}</div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/javascript" src="./assets/javascripts/main.js"></script>
  </body>
</html>
