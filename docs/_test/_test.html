<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>《上有力量的每日祈禱文》【雙排注音】</title>
    <meta charset="UTF-8">
    <style>
        ruby {
            ruby-position: over;
        }

        rb {
            font-size: 3.0em;
        }

        rt {
            font-size: 0.7em;
            letter-spacing: 0cm;
        }

        rtc {
            font-family: BopomofoRuby;
            color: #B94B6A;
            font-size: 60%;
            line-height: normal;
            ruby-merge: merge;

            -webkit-ruby-position: inter-character;
            ruby-position: inter-character;
            text-orientation: upright;
            letter-spacing: 0px;

            -webkitg_writing-mode: vertical-rl;
            writing-mode: vertical-rl;
            vertical-align: middle;
            display: inline;
        }
    </style>

<style id="nav-horizontal-fix">
/* 絕對橫向排列與防跑版 */
nav.main-nav {
    display: flex !important;
    flex-direction: row !important;
    justify-content: flex-start !important;
    align-items: center !important;
    flex-wrap: nowrap !important; /* 絕對不換行 */
    overflow-x: auto !important; /* 允許橫向捲動 */
    overflow-y: hidden !important;
    width: 100% !important;
    max-width: 100vw !important;
    background: #f8f9fa !important;
    padding: 15px 20px !important;
    margin: 20px 0 !important;
    border-radius: 10px !important;
    box-sizing: border-box !important;
    -webkit-overflow-scrolling: touch !important;
}

nav.main-nav ul {
    display: flex !important;
    flex-direction: row !important;
    flex-wrap: nowrap !important; /* 絕對不換行 */
    justify-content: flex-start !important;
    align-items: center !important;
    width: max-content !important; /* 讓 ul 自適應內容長度 */
    max-width: none !important;
    padding: 0 !important;
    margin: 0 !important;
    list-style: none !important;
    gap: 15px !important;
}

nav.main-nav ul li {
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    margin: 0 !important;
    padding: 0 !important;
    white-space: nowrap !important; /* 單一按鈕不折行 */
    flex-shrink: 0 !important;      /* 防止按鈕被擠壓 */
}

nav.main-nav ul li a, 
nav.main-nav ul li span {
    display: inline-block !important;
    white-space: nowrap !important;
}

/* 如果是手機螢幕太小，強制消除 body 被限制寬度造成的影響 */
body {
    max-width: 100% !important;
}
</style>

</head>

<body>
    <p>
        <ruby lang=zh-TW>
            <rb>美</rb>
            <rt>měi</rt>
            <rtc lang=zh-Latn>
                <rt>ㄇㄟˇ</rt>
            </rtc>
        </ruby>
    </p>


    <p>
        <ruby>
            <rtc>
                <rb>漢</rb>
                <rt>han3</rt>
                <rtc>ㄏㄢ³</rtc>
                <rb>字</rb>
                <rt>ji7</rt>
                <rtc>ㄖㄧ⁷</rtc>
            </rtc>
        </ruby>
    </p>




    <a href="index.html" class="floating-home-btn" title="回到首頁">🏠</a>
</body>

</html>
